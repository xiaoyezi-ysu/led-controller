<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <title>LED Controller</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh; color: #fff;
            display: flex; flex-direction: column; align-items: center; padding: 20px;
        }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 24px; font-weight: 600; margin-bottom: 5px; }
        .status-bar {
            display: flex; align-items: center; justify-content: center;
            gap: 8px; font-size: 13px; color: #888;
        }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%; background: #666; transition: background 0.3s;
        }
        .status-dot.connected { background: #4CAF50; box-shadow: 0 0 8px #4CAF50; }
        .status-dot.error { background: #f44336; box-shadow: 0 0 8px #f44336; }
        .card {
            background: rgba(255,255,255,0.05); border-radius: 16px; padding: 20px;
            width: 100%; max-width: 360px; margin-bottom: 16px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
        }
        .card-title {
            font-size: 14px; color: #888; margin-bottom: 12px;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .input-group { display: flex; gap: 8px; }
        input[type="text"] {
            flex: 1; background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 12px;
            padding: 14px 16px; color: #fff; font-size: 16px; outline: none;
        }
        input:focus { border-color: #4CAF50; }
        input::placeholder { color: #666; }
        .btn-connect {
            background: linear-gradient(135deg, #4CAF50, #45a049); border: none;
            border-radius: 12px; padding: 14px 24px; color: #fff;
            font-size: 16px; font-weight: 600; cursor: pointer;
            transition: transform 0.1s; white-space: nowrap;
        }
        .btn-connect:active { transform: scale(0.95); }
        .btn-connect.disconnect { background: linear-gradient(135deg, #f44336, #d32f2f); }
        .led-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .led-btn {
            border: none; border-radius: 16px; padding: 24px 16px; color: #fff;
            font-size: 18px; font-weight: 700; cursor: pointer;
            transition: transform 0.1s; display: flex; flex-direction: column;
            align-items: center; gap: 8px;
        }
        .led-btn:active { transform: scale(0.95); }
        .led-btn .icon { font-size: 32px; }
        .led-btn.red { background: linear-gradient(135deg, #e53935, #c62828); }
        .led-btn.yellow { background: linear-gradient(135deg, #fdd835, #f9a825); color: #333; }
        .led-btn.green { background: linear-gradient(135deg, #43a047, #2e7d32); }
        .led-btn.off { background: linear-gradient(135deg, #616161, #424242); grid-column: 1 / -1; }
        .led-btn.active { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 4px 20px currentColor; }
            50% { box-shadow: 0 4px 40px currentColor; }
        }
        .brightness-card { display: flex; align-items: center; gap: 16px; }
        .brightness-card label { font-size: 14px; color: #888; white-space: nowrap; }
        input[type="range"] {
            flex: 1; -webkit-appearance: none; height: 6px;
            background: rgba(255,255,255,0.2); border-radius: 3px; outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 24px; height: 24px;
            background: #4CAF50; border-radius: 50%; cursor: pointer;
        }
        .brightness-value { font-size: 14px; color: #4CAF50; min-width: 35px; text-align: right; }
        .log-card {
            max-height: 120px; overflow-y: auto;
            font-family: 'SF Mono', Monaco, monospace; font-size: 12px;
            line-height: 1.6; color: #888;
        }
        .log-card .time { color: #666; }
        .log-card .sent { color: #4CAF50; }
        .log-card .recv { color: #64b5f6; }
        .log-card .err { color: #f44336; }
        .quick-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .quick-btn {
            flex: 1; min-width: 60px; background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 10px;
            padding: 10px 8px; color: #fff; font-size: 12px; cursor: pointer; text-align: center;
        }
        .quick-btn:active { background: rgba(255,255,255,0.2); }
        .device-list { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }
        .device-item {
            display: flex; align-items: center; gap: 8px; padding: 8px 12px;
            background: rgba(255,255,255,0.05); border-radius: 10px; cursor: pointer;
            transition: background 0.2s;
        }
        .device-item:active { background: rgba(255,255,255,0.15); }
        .device-item .name { font-size: 14px; font-weight: 600; }
        .device-item .id { font-size: 11px; color: #888; flex: 1; overflow: hidden; text-overflow: ellipsis; }
        .device-item .del {
            font-size: 11px; color: #f44336; cursor: pointer; padding: 4px 8px;
            background: rgba(244,67,54,0.1); border-radius: 6px; white-space: nowrap;
        }
        .device-item .edit {
            font-size: 11px; color: #2196F3; cursor: pointer; padding: 4px 8px;
            background: rgba(33,150,243,0.1); border-radius: 6px; white-space: nowrap;
        }
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: #1a1a2e; border-radius: 16px; padding: 24px; width: 90%; max-width: 340px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .modal h3 { margin-bottom: 16px; font-size: 18px; }
        .modal .input-group { margin-bottom: 12px; }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
        .modal-actions button {
            padding: 10px 20px; border-radius: 10px; border: none; font-size: 14px; cursor: pointer;
            font-weight: 600;
        }
        .modal-actions .btn-cancel { background: rgba(255,255,255,0.1); color: #fff; }
        .modal-actions .btn-save { background: linear-gradient(135deg, #4CAF50, #45a049); color: #fff; }
        .btn-add {
            background: linear-gradient(135deg, #2196F3, #1976D2); border: none;
            border-radius: 12px; padding: 14px 16px; color: #fff;
            font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap;
        }
        .btn-add:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="header">
        <h1>LED Controller</h1>
        <div class="status-bar">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">未连接</span>
        </div>
    </div>

    <div class="card">
        <div class="card-title">设备</div>
        <div class="input-group">
            <input type="text" id="deviceId" placeholder="设备号 (ICCID)" value="">
            <button class="btn-connect" id="btnConnect" onclick="toggleConnection()">连接</button>
        </div>
        <div class="device-list" id="deviceList"></div>
        <div class="input-group" style="margin-top: 8px;">
            <input type="text" id="newDeviceName" placeholder="设备名称" style="flex:0.6">
            <input type="text" id="newDeviceId" placeholder="ICCID" style="flex:1">
            <button class="btn-add" onclick="addDevice()">添加</button>
        </div>
    </div>

    <div class="card">
        <div class="card-title">灯控</div>
        <div class="led-grid">
            <button class="led-btn red" onclick="sendCmd('red')">
                <span class="icon">🔴</span> 红灯
            </button>
            <button class="led-btn yellow" onclick="sendCmd('blue')">
                <span class="icon">🟡</span> 黄灯
            </button>
            <button class="led-btn green" onclick="sendCmd('green')">
                <span class="icon">🟢</span> 绿灯
            </button>
            <button class="led-btn off" onclick="sendCmd('off')">
                <span class="icon">⭕</span> 关闭
            </button>
        </div>
    </div>

    <div class="card">
        <div class="card-title">亮度</div>
        <div class="brightness-card">
            <label>亮度</label>
            <input type="range" id="brightness" min="10" max="255" value="255" oninput="updateBrightness()">
            <span class="brightness-value" id="brightnessValue">255</span>
        </div>
        <div class="quick-actions" style="margin-top: 12px;">
            <button class="quick-btn" onclick="setBrightness(50)">暗</button>
            <button class="quick-btn" onclick="setBrightness(128)">中</button>
            <button class="quick-btn" onclick="setBrightness(200)">亮</button>
            <button class="quick-btn" onclick="setBrightness(255)">最亮</button>
        </div>
    </div>

    <div class="card">
        <div class="card-title">日志</div>
        <div class="log-card" id="log"></div>
    </div>

    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <h3>编辑设备</h3>
            <div class="input-group">
                <input type="text" id="editName" placeholder="设备名称">
            </div>
            <div class="input-group">
                <input type="text" id="editId" placeholder="ICCID">
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeEdit()">取消</button>
                <button class="btn-save" onclick="saveEdit()">保存</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/mqtt@5.3.4/dist/mqtt.min.js"></script>
    <script>
        const BROKER = 'wss://broker.emqx.io:8084/mqtt';
        const PUB_TOPIC = 'xiaoyeziUESTC1147';
        const SUB_TOPIC = 'DTU_Topic1147/+';
        const API_BASE = window.location.origin;
        let client = null, isConnected = false, deviceId = '';
        let devices = [];
        const DEFAULT_DEVICES = [
            { name: '车牌', id: '89860812192380777521', fixed: true },
            { name: 'PC13灯', id: '89860812192380777549', fixed: true },
            { name: '测试', id: '00000', fixed: true }
        ];

        async function loadDevices() {
            try {
                const r = await fetch(API_BASE + '/api/devices');
                if (r.ok) { devices = await r.json(); return; }
            } catch(e) {}
            try { devices = JSON.parse(localStorage.getItem('led_devices')) || []; }
            catch(e) { devices = []; }
            // merge defaults (user-added only, keep fixed ones)
            const existing = new Set(devices.map(d => d.id));
            for (const d of DEFAULT_DEVICES) {
                if (!existing.has(d.id)) devices.push({...d});
            }
        }
        async function saveDevices() {
            localStorage.setItem('led_devices', JSON.stringify(devices));
            try {
                await fetch(API_BASE + '/api/devices', {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify(devices)
                });
            } catch(e) {}
        }
        function renderDevices() {
            const el = document.getElementById('deviceList');
            el.innerHTML = devices.map((d, i) =>
                '<div class="device-item" onclick="selectDevice('+i+')">' +
                '<span class="name">' + d.name + '</span>' +
                '<span class="id">' + d.id + '</span>' +
                '<span class="edit" onclick="event.stopPropagation();editDevice('+i+')">编辑</span>' +
                (d.fixed ? '' : '<span class="del" onclick="event.stopPropagation();delDevice('+i+')">删除</span>') +
                '</div>'
            ).join('');
        }
        function selectDevice(i) {
            if (devices[i]) {
                document.getElementById('deviceId').value = devices[i].id;
                deviceId = devices[i].id;
                log('已选择: ' + devices[i].name, 'time');
            }
        }
        function delDevice(i) {
            if (devices[i].fixed) return;
            const name = devices[i].name;
            devices.splice(i, 1);
            saveDevices();
            renderDevices();
            log('已删除: ' + name, 'time');
        }
        let editIdx = -1;
        function editDevice(i) {
            if (!devices[i]) return;
            editIdx = i;
            document.getElementById('editName').value = devices[i].name;
            document.getElementById('editId').value = devices[i].id;
            document.getElementById('editModal').classList.add('show');
        }
        function saveEdit() {
            const name = document.getElementById('editName').value.trim();
            const id = document.getElementById('editId').value.trim();
            if (!name || !id) { log('名称和ICCID不能为空', 'err'); return; }
            if (id !== devices[editIdx].id && devices.some(d => d.id === id)) {
                log('该ICCID已存在', 'err'); return;
            }
            devices[editIdx] = { name, id };
            saveDevices();
            renderDevices();
            closeEdit();
            log('已更新: ' + name, 'sent');
        }
        function closeEdit() {
            document.getElementById('editModal').classList.remove('show');
            editIdx = -1;
        }
        function addDevice() {
            const name = document.getElementById('newDeviceName').value.trim();
            const id = document.getElementById('newDeviceId').value.trim();
            if (!name || !id) { log('请输入设备名和ICCID', 'err'); return; }
            if (devices.some(d => d.id === id)) { log('该ICCID已存在', 'err'); return; }
            devices.push({ name, id });
            saveDevices();
            renderDevices();
            document.getElementById('newDeviceName').value = '';
            document.getElementById('newDeviceId').value = '';
            log('已添加: ' + name, 'sent');
        }

        async function init() {
            await loadDevices();
            renderDevices();
            const saved = localStorage.getItem('led_device_id');
            if (saved) document.getElementById('deviceId').value = saved;
        }

        function toggleConnection() {
            if (isConnected) disconnect(); else connect();
        }

        function connect() {
            deviceId = document.getElementById('deviceId').value.trim();
            if (!deviceId) { log('请输入设备号', 'err'); return; }
            localStorage.setItem('led_device_id', deviceId);
            log('连接中...', 'time');
            setStatus('connecting');

            try {
                client = mqtt.connect(BROKER, {
                    clientId: 'led_' + Math.random().toString(16).substr(2, 8),
                    clean: true, connectTimeout: 8000, reconnectPeriod: 0
                });

                client.on('connect', () => {
                    isConnected = true;
                    setStatus('connected');
                    log('已连接 MQTT', 'sent');
                    client.subscribe(SUB_TOPIC, { qos: 0 }, (err) => {
                        if (!err) log('已订阅 ' + SUB_TOPIC, 'sent');
                    });
                    document.getElementById('btnConnect').textContent = '断开';
                    document.getElementById('btnConnect').classList.add('disconnect');
                });

                client.on('message', (topic, message) => {
                    try {
                        const data = JSON.parse(message.toString());
                        log('收到: ' + JSON.stringify(data), 'recv');
                    } catch (e) {
                        log('收到: ' + message.toString(), 'recv');
                    }
                });

                client.on('error', (err) => { log('错误: ' + err.message, 'err'); setStatus('error'); });
                client.on('close', () => {
                    if (isConnected) {
                        isConnected = false; setStatus('disconnected'); log('连接断开', 'err');
                        document.getElementById('btnConnect').textContent = '连接';
                        document.getElementById('btnConnect').classList.remove('disconnect');
                    }
                });
                client.on('offline', () => { setStatus('error'); log('离线', 'err'); });
            } catch (e) { log('连接失败: ' + e.message, 'err'); setStatus('error'); }
        }

        function disconnect() {
            if (client) { client.end(true); client = null; }
            isConnected = false; setStatus('disconnected');
            document.getElementById('btnConnect').textContent = '连接';
            document.getElementById('btnConnect').classList.remove('disconnect');
            log('已断开', 'time');
        }

        function sendCmd(cmd) {
            if (!isConnected || !client) { log('未连接', 'err'); return; }
            const bright = parseInt(document.getElementById('brightness').value);
            const targetId = document.getElementById('deviceId').value.trim();
            if (!targetId) { log('请输入设备号', 'err'); return; }
            deviceId = targetId;
            const msg = JSON.stringify({ cardID: deviceId, cmd: cmd, bright: bright });
            client.publish(PUB_TOPIC + '/' + deviceId, msg, { qos: 0 }, (err) => {
                if (err) log('发送失败: ' + err.message, 'err');
                else { log('发送: ' + cmd + ' (' + bright + ') → ' + deviceId, 'sent'); highlightBtn(cmd); }
            });
        }

        function highlightBtn(cmd) {
            document.querySelectorAll('.led-btn').forEach(b => b.classList.remove('active'));
            const map = { red: 0, yellow: 1, green: 2, off: 3 };
            const btns = document.querySelectorAll('.led-btn');
            if (map[cmd] !== undefined && btns[map[cmd]]) btns[map[cmd]].classList.add('active');
        }

        function updateBrightness() {
            document.getElementById('brightnessValue').textContent = document.getElementById('brightness').value;
        }

        function setBrightness(val) {
            document.getElementById('brightness').value = val;
            updateBrightness();
        }

        function setStatus(state) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            dot.className = 'status-dot';
            if (state === 'connected') { dot.classList.add('connected'); text.textContent = '已连接'; }
            else if (state === 'connecting') { text.textContent = '连接中...'; }
            else if (state === 'error') { dot.classList.add('error'); text.textContent = '连接错误'; }
            else { text.textContent = '未连接'; }
        }

        function log(msg, cls) {
            const el = document.getElementById('log');
            const time = new Date().toLocaleTimeString('zh-CN', { hour12: false });
            el.innerHTML += '<div><span class="time">' + time + '</span> <span class="' + (cls||'') + '">' + msg + '</span></div>';
            el.scrollTop = el.scrollHeight;
            while (el.children.length > 50) el.removeChild(el.firstChild);
        }

        init();
    </script>
</body>
</html>
